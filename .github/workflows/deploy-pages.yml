name: Deploy to GitHub Pages

# main ブランチへの push 時に自動でページを更新
# JSON データはローカルで生成して push してください

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'data/**'
      - 'index.html'
      - '.github/workflows/deploy-pages.yml'
  schedule:
    - cron: '25 12 * * *'  # 毎日21:25 JST
    - cron: '55 13 * * *'  # 毎日22:55 JST（保険実行）
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
